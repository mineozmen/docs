components:
  parameters:
    productidParam:
      name: productid
      in: query
      description: ID of the product to get
      required: true
      schema:
        type: string
        example: f_15360092
    productidsParam:
      name: productids
      in: query
      description: IDs of the products
      required: true
      schema:
        type: array
        items:
          type: string
        example: ["f_15360092"]
    languageParam:
      name: language
      in: query
      description: Language for returned details
      required: false
      schema:
        type: string
        example: enUS
    currencyParam:
      name: currency
      in: query
      description: Currency for returned details
      required: false
      schema:
        type: string
        example: USD
    searchParam:
      name: search
      in: query
      description: Text to search
      required: true
      schema:
        type: string
        example: Nike
    attribute1sParam:
      name: attribute1s
      in: query
      description: First set of attribute values to search
      required: false
      schema:
        type: array
        items:
          type: string
        example: ["10001"]
    attribute2sParam:
      name: attribute2s
      in: query
      description: Second set of attribute values to search
      required: false
      schema:
        type: array
        items:
          type: string
        example: ["10001"]
    attribute3sParam:
      name: attribute3s
      in: query
      description: Third set of attribute values to search
      required: false
      schema:
        type: array
        items:
          type: string
        example: ["10001"]
    minpriceParam:
      name: minprice
      in: query
      description: Minimum price
      required: false
      schema:
        type: number
        example: 0
    maxpriceParam:
      name: maxprice
      in: query
      description: Maximum price
      required: false
      schema:
        type: number
        example: 1000
    categoryidParam:
      name: categoryid
      in: query
      description: ID of the category to get
      required: true
      schema:
        type: string
        example: "97"
    categoryidsParam:
      name: categoryids
      in: query
      description: List of category ids
      required: false
      schema:
        type: array
        items:
          type: string
        example: ["70"]
    brandidParam:
      name: brandid
      in: query
      description: ID of the brand to get
      required: true
      schema:
        type: string
        example: "70"
    brandidsParam:
      name: brandids
      in: query
      description: List of brand ids
      required: false
      schema:
        type: array
        items:
          type: string
        example: ["70"]
    autofilterParam:
      name: autofilter
      in: query
      description: Autofilter search
      required: true
      schema:
        type: boolean
        example: true
    orderbyParam:
      name: orderby
      in: query
      description: Order by field
      required: true
      schema:
        type: string
        example: relevance
    ascendingParam:
      name: ascending
      in: query
      description: Order by is ascending
      required: false
      schema:
        type: boolean
        example: false
    attribute1idParam:
      name: attribute1id
      in: query
      description: First set of attribute values to return
      required: false
      schema:
        type: string
        example: "1"
    attribute2idParam:
      name: attribute2id
      in: query
      description: First set of attribute values to return
      required: false
      schema:
        type: string
        example: "2"
    attribute3idParam:
      name: attribute3id
      in: query
      description: First set of attribute values to return
      required: false
      schema:
        type: string
        example: "3"
    collectionidParam:
      name: collectionid
      in: query
      description: Id of the collection to view
      required: true
      schema:
        type: string
        example: "1"


  responses:
    searchResultsOK:
      description: OK
      content:
          application/json:
            schema:
              type: object
              properties:
                total:
                  type: object
                  properties:
                    count:
                        title: Total products in results
                        type: number
                stats:
                  type: array
                  title: List of most frequent attributes in search results 
                  items:
                    type: object
                    properties:
                      id:
                        title: Attribute id
                        type: string
                      count:
                        title: Products with attribute in results
                        type: number
                products:
                  $ref: "#/components/schemas/productList"

  schemas:
    parameters:
      type: object
      description: Parameters of this API call
    genericResult:
      type: object
    facetPrices:
      type: object
      properties:
        min:
          type: number
          description: Minimum price in search results
        max:
          type: number
          description: Maximum price in search results
    facetItems:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          count:
            type: number
          name:
            type: string
    productList:
      type: array
      items:
        title: Product
        type: object
        properties:
          id:
            title: Product id
            type: string
          data:
            title: Product data
            type: object
    product:
      type: object
      properties:
        id:
          type: string
        data:
          title: Product data
          type: object
    brand:
      type: object
      properties:
        id:
          type: string
        data:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            images:
              type: array
              items:
                type: string             
    category:
      type: object
      properties:
        id:
          type: string
        data:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            images:
              type: array
              items:
                type: string
    collection:
      type: object
      properties:
        id:
          type: string
        data:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            images:
              type: array
              items:
                type: string
