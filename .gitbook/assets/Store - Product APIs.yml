        '200':
          description: OK
          content:
              application/json:
                schema:
                  type: object
                  properties:
                    facets:
                      type: array
                      description: Most frequent facet values for requested facets
                      items:
                        type: object
                        properties:
                          prices:
                            $ref: "#/components/schemas/facetPrices"
                          brands:
                            $ref: "#/components/schemas/facetItems"
                          categories:
