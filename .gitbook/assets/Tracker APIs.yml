openapi: 3.0.0
info:
  version: 1.0.0
  title: Rierino - Gateway Server - Tracker APIs
  license:
    name: Commercial

servers:
- url: localhost:1234
  description: Local test server
  
paths:

  /api/track/{channel}/{path}:
  
    post:
      summary: New tracking event
      description: Posts an event to tracking service and topic, as if it is the response from an API call on [channel] and [path], where request body represents the event payload. Received data is subject to same checks and transformations of a gateway request, meaning it will be authenticated, sessionized and its headers and cookies will be used to enrich request metadata.
      parameters:
        - $ref: '#/components/parameters/channelParam'
        - $ref: '#/components/parameters/pathParam'
      requestBody:
        description: Event payload
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          $ref: '#/components/responses/GenericOK'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '501':
          $ref: '#/components/responses/NotImplemented'
  
components:

  parameters:
    pathParam:
      name: path
      in: path
      description: "Path for registering specific action / saga on gateway channel"
      required: true
      schema:
        type: string
        example: product
    channelParam:
      name: channel
      in: path
      description: "Gateway channel as origin of event"
      required: true
      schema:
        type: string
        example: crud
        
  responses:
    GenericOK:
      description: "OK"
    Unauthorized:
      description: "Authorization information is missing or invalid."
    Forbidden:
      description: "User does not have the required role for access."
    InternalError:
      description: "Server failed to process request due to internal errors."
    NotImplemented:
      description: "Feature is not implemented by the server."
